<!-- News Search -->
<div class="search-position">
  <div class="search-block">
    <div class="search-block-input">
      <span class="search-icon"></span>
    </div>
    <input class="search-input" type="text" name="" value="" placeholder="{% if page.lang == 'en' %}Search by keyword (e.g. Tutorial, Guide, Dojo){% else %}キーワードで検索する (例: チュートリアル、ガイド、Dojo){% endif %}" id="search-input">

  </div>
  <div class="search-block-result">
    <ul id="search-results"></ul>
  </div>
</div>

<script src="/js/simple-jekyll-search.js"></script>
<script>
 const sjs = SimpleJekyllSearch({
   searchInput:          document.getElementById('search-input'),
   resultsContainer:     document.getElementById('search-results'),
   json:                 '{% if page.lang == 'en' %}/search-en.json{% else %}/search.json{% endif %}',
   searchResultTemplate: '<li class="news-item"><span class="news-date">{date}{% if page.lang != 'en' %}年{% endif %}</span> <span><a href="{url}">{title}</a></span></li>',
   noResultsText:        '{% if page.lang == 'en' %}No results found.{% else %}検索結果が見つかりませんでした。{% endif %}',
   limit:                20,

   // Mark hit keywords
   templateMiddleware: function(prop, value, template) {
     const query = document.getElementById('search-input').value.trim();
     if (query && typeof value === 'string') {
       // 加工対象を限定する
       const highlightTargets = ['title', 'date'];

       if (highlightTargets.includes(prop)) {
	 const keywords = query.split(/\s+/).filter(Boolean);
	 if (keywords.length === 0) return value;

	 const regex = new RegExp('(' + keywords.map(escapeRegExp).join('|') + ')', 'gi');
	 return value.replace(regex, '<mark>$1</mark>');
       }
     }

     return value; // 加工対象じゃないならそのまま返す
   }
 });

 // 正規表現エスケープ用の関数
 function escapeRegExp(string) {
   return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
 }
</script>
<!-- News Search -->
