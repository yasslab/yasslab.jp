<section id="clients_and_partners">
  <div class="container tutorial">
    <h3>
      <a href="#clients_and_partners">
	<i class="fad fa-handshake-alt"></i>
	{% if page.lang == 'en' %}Partners & Customers{% else %}利用実績・提携法人{% endif %}
      </a>
    </h3>
    <div class="cp-note">
      <small>
	{% if page.lang == 'en' %}
	( <i class="fas fa-mouse-pointer" aria-hidden="true"></i>
	Click for details)
	{% else %}
	（ <i class="fas fa-mouse-pointer" aria-hidden="true"></i>
	クリックで取り組みの詳細が見れます）
	{% endif %}
      </small>
    </div>
    <div class="col-12 text-center cp-logos">
      <ul class="flex-container">
        {% for cp in site.data.clients_and_partners %}
        <li class="item">
          <a href="{{ cp.link_to }}" target='_blank'>
            <img  src="/img/spinner.svg" class="lazyload"
	     data-src="{{ cp.image }}" alt="{{ cp.name }}"
	     width="{{ cp.width | default: '100%' }}">
          </a>
        </li>
        {% endfor %}
      </ul>

      <div class="tutorial">
        <a href="/ja/#services">
          <button class="btn btn-primary">
	    {% if page.lang == 'en' %}See details (Japanese){% else %}サービス紹介を見る{% endif %}
	  </button>
        </a>
      </div>
    </div>
  </div>
</section>
